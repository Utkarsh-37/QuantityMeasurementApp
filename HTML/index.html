<!-- 
    UC-JS-02 : App Initialisation
    1. Wrap all code in: document.addEventListener("DOMContentLoaded", async () => { ... })
    2. Declare state = { type:"Length", action:"Conversion", fromVal:null, fromUnit:"", toVal:null, toUnit:"", operator:"+" }
    3. Call attachEventListeners().
    4. Call loadUnits("Length") to populate FROM and TO dropdowns.
    5. Set first type-card and first action-button as active.
    6. Hide operator row: toggleOperators(false).
    7. Call loadHistory()

    @author Developer
    @version 2.0
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>

    <div class="container-fluid p-0">

        <!-- Header -->
        <div class="header text-center text-white py-4">
            <h1>Welcome To Quantity Measurement</h1>
        </div>

        <div class="container mt-3">

            <!-- Choose Type -->
            <p class="section-title">CHOOSE TYPE</p>

            <div class="row g-4">

                <div class="col-md-3">
                    <div class="type-card active text-center">
                        <i class="bi bi-rulers icon"></i>
                        <p>Length</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center">
                        <i class="bi bi-speedometer2 icon"></i>
                        <p>Weight</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center">
                        <i class="bi bi-thermometer-half icon"></i>
                        <p>Temperature</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center">
                        <i class="bi bi-droplet icon"></i>
                        <p>Volume</p>
                    </div>
                </div>

            </div>

            <!-- Choose Action -->
            <p class="section-title mt-3">CHOOSE ACTION</p>

            <div class="row g-3">

                <div class="col-md-4">
                    <button class="btn action-btn active w-100">
                        Comparison
                    </button>
                </div>

                <div class="col-md-4">
                    <button class="btn action-btn w-100">
                        Conversion
                    </button>
                </div>

                <div class="col-md-4">
                    <button class="btn action-btn w-100">
                        Arithmetic
                    </button>
                </div>

            </div>

            <!-- Input -->
            <div class="row mt-3 g-4 mb-3">

                <!-- From -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">FROM</label>

                    <div class="input-box">
                        <input
                            type="number"
                            class="form-control input-number"
                            placeholder="Enter value"
                        >

                        <select class="form-select mt-3">
                            <option>Kilometer</option>
                            <option>Meter</option>
                            <option>Centimeter</option>
                        </select>
                    </div>
                </div>

                <!-- To -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">TO</label>

                    <div class="input-box">
                        <input
                            type="number"
                            class="form-control input-number"
                            placeholder="Result"
                        >

                        <select class="form-select mt-3">
                            <option>Meters</option>
                            <option>Kilometers</option>
                            <option>Centimeters</option>
                        </select>
                    </div>
                </div>

            </div>

        </div>
    </div>
        <!-- JS Files -->
    <script src="../JAVASCRIPT/app.js"></script>

</body>
</html>
